# 테스트 전용 설정 — 실제 외부 서비스에 연결하지 않음

# DB — 슬라이스 테스트(@WebMvcTest)에서는 JPA 컨텍스트 자체가 로드되지 않으므로
# 실제 연결이 필요한 @SpringBootTest용 플레이스홀더 (컨텍스트 로드 실패 방지)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.datasource.hikari.initialization-fail-timeout=0

# Redis — 테스트에서 실제 Redis 불필요 (MockBean으로 대체, 자동설정 제외)
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# JWT
app.jwt.secret=test-jwt-secret-min-32-chars-for-testing
app.jwt.access-token-expiry=900
app.jwt.refresh-token-expiry=604800

# CORS
app.cors.allowed-origins=http://localhost:5173

# HMAC / IP Hash
app.hmac.secret=test-hmac-secret
app.ip-hash.salt=test-ip-salt

# 이메일
resend.api-key=test-key
app.mail.from=noreply@test.kr
app.mail.verification-token-expiry=86400
app.mail.base-url=http://localhost:5173

# OAuth2 — 테스트에서 실제 Google 연결 불필요, 플레이스홀더로 컨텍스트 로드만 허용
spring.security.oauth2.client.registration.google.client-id=test-google-client-id
spring.security.oauth2.client.registration.google.client-secret=test-google-client-secret
spring.security.oauth2.client.registration.google.scope=email,profile

# 디버그 로깅 — SecurityConfig 빈 생성 추적
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.beans=DEBUG

# Cloudflare R2 — 테스트에서 불필요
app.r2.endpoint=https://test.r2.cloudflarestorage.com
app.r2.access-key=test-access-key
app.r2.secret-key=test-secret-key
app.r2.bucket=test-bucket
app.r2.public-url=https://test-public.r2.dev
