spring.application.name=DobakGgunGames

# Database
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:dobakggun}?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# Security
app.hmac.secret=${HMAC_SECRET:dev-secret-change-in-production}
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173}

# Server
server.port=${PORT:8080}
