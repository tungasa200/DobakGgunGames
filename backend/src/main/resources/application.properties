spring.application.name=DobakGgunGames

# Database
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:dobakggun}?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
spring.jackson.serialization.write-dates-as-timestamps=false

# Security (레거시)
app.hmac.secret=${HMAC_SECRET:dev-secret-change-in-production}
app.ip-hash.salt=${IP_HASH_SALT:dev-ip-salt-change-in-production}
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173}

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# JWT
app.jwt.secret=${JWT_SECRET:dev-jwt-secret-min-32-chars-change-in-prod}
app.jwt.access-token-expiry=900
app.jwt.refresh-token-expiry=604800

# 이메일 인증
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.verification-token-expiry=86400
app.mail.base-url=${APP_BASE_URL:http://localhost:5173}

# OAuth2 — Google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

# OAuth2 — Kakao, Naver (비활성화 — 추후 추가 예정)
# spring.security.oauth2.client.registration.kakao...
# spring.security.oauth2.client.registration.naver...

# Server
server.port=${PORT:8080}
server.forward-headers-strategy=framework

# Cloudflare R2
app.r2.endpoint=${R2_ENDPOINT}
app.r2.access-key=${R2_ACCESS_KEY_ID}
app.r2.secret-key=${R2_SECRET_ACCESS_KEY}
app.r2.bucket=${R2_BUCKET:dbg-games}
app.r2.public-url=${R2_PUBLIC_URL:}
