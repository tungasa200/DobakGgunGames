<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>White Plastic D8 — Three.js</title>
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; background: #1a1a1a; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
  canvas { display: block; }
  #info { position: absolute; top: 16px; left: 16px; color: rgba(255,255,255,0.4); font-size: 12px; pointer-events: none; user-select: none; letter-spacing: 0.3px; }
</style>
</head>
<body>
<div id="info">드래그: 회전  ·  휠: 줌</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============ Scene/Camera/Renderer ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a1a);

const camera = new THREE.PerspectiveCamera(32, innerWidth / innerHeight, 0.1, 100);
let camDist = 5.0;
function updateCamera() {
  camera.position.set(
    camDist * Math.cos(0.45) * Math.sin(0.6),
    camDist * Math.sin(0.45),
    camDist * Math.cos(0.45) * Math.cos(0.6)
  );
  camera.lookAt(0, 0, 0);
}
updateCamera();

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

// === Floor ===
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(30, 30),
  new THREE.MeshStandardMaterial({ color: 0x252525, roughness: 0.85, metalness: 0 })
);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -0.95;
floor.receiveShadow = true;
scene.add(floor);

// === Lights ===
scene.add(new THREE.AmbientLight(0xffffff, 0.32));
const keyLight = new THREE.DirectionalLight(0xfff2dc, 1.1);
keyLight.position.set(4, 7, 5);
keyLight.castShadow = true;
keyLight.shadow.mapSize.set(2048, 2048);
keyLight.shadow.camera.left = -3;
keyLight.shadow.camera.right = 3;
keyLight.shadow.camera.top = 3;
keyLight.shadow.camera.bottom = -3;
keyLight.shadow.camera.near = 0.5;
keyLight.shadow.camera.far = 20;
keyLight.shadow.bias = -0.0004;
keyLight.shadow.radius = 4;
scene.add(keyLight);
const fillLight = new THREE.DirectionalLight(0xc8d4f0, 0.4);
fillLight.position.set(-5, 3, -2);
scene.add(fillLight);
const rimLight = new THREE.DirectionalLight(0xffffff, 0.5);
rimLight.position.set(-3, 5, -6);
scene.add(rimLight);

// ============ Atlas Texture (4x2 grid of numerals 1-8) ============
const ATLAS_W = 2048, ATLAS_H = 1024;
const CELL_W = ATLAS_W / 4, CELL_H = ATLAS_H / 2;

const atlasCanvas = document.createElement('canvas');
atlasCanvas.width = ATLAS_W;
atlasCanvas.height = ATLAS_H;
const atlasCtx = atlasCanvas.getContext('2d');
atlasCtx.fillStyle = '#faf9f5';
atlasCtx.fillRect(0, 0, ATLAS_W, ATLAS_H);

const cellPos = [
  null,
  [0, 0], [1, 0], [2, 0], [3, 0],
  [0, 1], [1, 1], [2, 1], [3, 1]
];

atlasCtx.fillStyle = '#0c0c0c';
atlasCtx.font = `bold ${Math.round(CELL_H * 0.6)}px "Helvetica Neue", Arial, sans-serif`;
atlasCtx.textAlign = 'center';
atlasCtx.textBaseline = 'middle';
for (let n = 1; n <= 8; n++) {
  const [cx, cy] = cellPos[n];
  const xCenter = cx * CELL_W + CELL_W / 2;
  const yCenter = cy * CELL_H + CELL_H / 2;
  atlasCtx.fillText(String(n), xCenter, yCenter);
  if (n === 6) {
    const ulw = CELL_W * 0.20, ulh = CELL_H * 0.022;
    atlasCtx.fillRect(xCenter - ulw / 2, yCenter + CELL_H * 0.22, ulw, ulh);
  }
}

const atlasTexture = new THREE.CanvasTexture(atlasCanvas);
atlasTexture.minFilter = THREE.LinearMipmapLinearFilter;
atlasTexture.magFilter = THREE.LinearFilter;
atlasTexture.wrapS = THREE.ClampToEdgeWrapping;
atlasTexture.wrapT = THREE.ClampToEdgeWrapping;
atlasTexture.anisotropy = renderer.capabilities.getMaxAnisotropy();
atlasTexture.encoding = THREE.sRGBEncoding;

// 표준 d8: 마주보는 면 합 = 9
function getFaceNumber(sx, sy, sz) {
  if (sx > 0 && sy > 0 && sz > 0) return 1;
  if (sx < 0 && sy < 0 && sz < 0) return 8;
  if (sx > 0 && sy > 0 && sz < 0) return 2;
  if (sx < 0 && sy < 0 && sz > 0) return 7;
  if (sx > 0 && sy < 0 && sz > 0) return 3;
  if (sx < 0 && sy > 0 && sz < 0) return 6;
  if (sx > 0 && sy < 0 && sz < 0) return 4;
  if (sx < 0 && sy > 0 && sz > 0) return 5;
  return 1;
}

// ============ Rounded Octahedron mapping ============
function roundedOctahedronPosition(px, py, pz, R, cR) {
  const SQRT3 = Math.sqrt(3);
  const K = R - cR * SQRT3;

  const sx = px >= 0 ? 1 : -1;
  const sy = py >= 0 ? 1 : -1;
  const sz = pz >= 0 ? 1 : -1;

  const distFactor = (sx * px + sy * py + sz * pz - K) / 3;
  const projx = px - distFactor * sx;
  const projy = py - distFactor * sy;
  const projz = pz - distFactor * sz;

  const a = sx * projx / K;
  const b = sy * projy / K;
  const c = sz * projz / K;

  const eps = 1e-7;
  if (a >= -eps && b >= -eps && c >= -eps) {
    return {
      x: projx + cR * sx / SQRT3,
      y: projy + cR * sy / SQRT3,
      z: projz + cR * sz / SQRT3
    };
  }

  const v0x = sx * K, v0y = 0,        v0z = 0;
  const v1x = 0,        v1y = sy * K, v1z = 0;
  const v2x = 0,        v2y = 0,        v2z = sz * K;

  function projSeg(qx, qy, qz, ax, ay, az, bx, by, bz) {
    const ex = bx - ax, ey = by - ay, ez = bz - az;
    const e2 = ex * ex + ey * ey + ez * ez;
    let t = ((qx - ax) * ex + (qy - ay) * ey + (qz - az) * ez) / e2;
    t = Math.max(0, Math.min(1, t));
    return [ax + t * ex, ay + t * ey, az + t * ez];
  }

  let cx, cy, cz;
  if (a < 0 && b < 0)        { cx = v2x; cy = v2y; cz = v2z; }
  else if (a < 0 && c < 0)   { cx = v1x; cy = v1y; cz = v1z; }
  else if (b < 0 && c < 0)   { cx = v0x; cy = v0y; cz = v0z; }
  else if (a < 0)            { [cx, cy, cz] = projSeg(px, py, pz, v1x, v1y, v1z, v2x, v2y, v2z); }
  else if (b < 0)            { [cx, cy, cz] = projSeg(px, py, pz, v0x, v0y, v0z, v2x, v2y, v2z); }
  else                       { [cx, cy, cz] = projSeg(px, py, pz, v0x, v0y, v0z, v1x, v1y, v1z); }

  const nx = px - cx, ny = py - cy, nz = pz - cz;
  const nLen = Math.sqrt(nx * nx + ny * ny + nz * nz);

  if (nLen < 1e-9) {
    return { x: cx, y: cy, z: cz };
  }

  return {
    x: cx + cR * nx / nLen,
    y: cy + cR * ny / nLen,
    z: cz + cR * nz / nLen
  };
}

// ============ Build the d8 die geometry ============
// UV는 삼각형 단위로 계산. 삼각형의 centroid의 옥탄트로 어느 면인지 판정하고,
// 그 면의 셀 좌표계를 모든 3개 정점에 일관되게 사용.
// 인접 면 사이의 모서리 정점은 OctahedronGeometry에서 별도 복사본으로 존재하므로,
// 같은 위치라도 면 A에 속한 복사본은 A의 UV를, B에 속한 복사본은 B의 UV를 가짐.
// → 셀 경계를 가로지르는 보간이 발생하지 않음.
function createOctahedronDie(R, cornerRadius, detail, numeralExtent) {
  const geom = new THREE.OctahedronGeometry(R, detail);
  const positions = geom.attributes.position;
  const uvs = new Float32Array(positions.count * 2);
  const SQRT2 = Math.sqrt(2), SQRT6 = Math.sqrt(6);

  // 1단계: 모든 정점에 라운디드 위치 계산
  const newPos = new Float32Array(positions.count * 3);
  for (let i = 0; i < positions.count; i++) {
    const r = roundedOctahedronPosition(
      positions.getX(i), positions.getY(i), positions.getZ(i),
      R, cornerRadius
    );
    newPos[i * 3] = r.x; newPos[i * 3 + 1] = r.y; newPos[i * 3 + 2] = r.z;
  }

  // 2단계: 삼각형별 UV (비인덱스이므로 3개씩 묶임)
  const numTri = positions.count / 3;
  for (let t = 0; t < numTri; t++) {
    const i0 = t * 3, i1 = t * 3 + 1, i2 = t * 3 + 2;
    const cx = (positions.getX(i0) + positions.getX(i1) + positions.getX(i2)) / 3;
    const cy = (positions.getY(i0) + positions.getY(i1) + positions.getY(i2)) / 3;
    const cz = (positions.getZ(i0) + positions.getZ(i1) + positions.getZ(i2)) / 3;
    const sx = cx >= 0 ? 1 : -1;
    const sy = cy >= 0 ? 1 : -1;
    const sz = cz >= 0 ? 1 : -1;

    const num = getFaceNumber(sx, sy, sz);
    const [cellX, cellY] = cellPos[num];

    // 면 중심 (원래 면 평면 위)
    const fcx = sx * R / 3, fcy = sy * R / 3, fcz = sz * R / 3;

    // u-axis: 면 평면 안 카메라 right 방향. (오른손계: u × v = normal)
    const ux = sz / SQRT2,        uy = 0,             uz = -sx / SQRT2;
    // v-axis: 월드 +y 방향을 면 평면에 투영. 모든 면에서 글자 위쪽이 월드 위쪽으로.
    const vx = -sx * sy / SQRT6,  vy = 2 / SQRT6,     vz = -sy * sz / SQRT6;

    for (const i of [i0, i1, i2]) {
      const rx = newPos[i * 3]     - fcx;
      const ry = newPos[i * 3 + 1] - fcy;
      const rz = newPos[i * 3 + 2] - fcz;
      const u_coord = rx * ux + ry * uy + rz * uz;
      const v_coord = rx * vx + ry * vy + rz * vz;

      let cu = 0.5 + u_coord / numeralExtent;
      let cv = 0.5 - v_coord / numeralExtent;
      cu = Math.max(0, Math.min(1, cu));
      cv = Math.max(0, Math.min(1, cv));

      uvs[i * 2]     = (cellX + cu) / 4;
      uvs[i * 2 + 1] = 1 - (cellY + cv) / 2;
    }
  }

  // 새 위치 적용
  for (let i = 0; i < positions.count; i++) {
    positions.setXYZ(i, newPos[i * 3], newPos[i * 3 + 1], newPos[i * 3 + 2]);
  }

  geom.setAttribute('uv', new THREE.BufferAttribute(uvs, 2));
  positions.needsUpdate = true;
  return geom;
}

// 같은 위치 정점들의 normal을 평균 (UV는 면별로 다르므로 정점 자체는 병합 안 함)
function smoothNormalsAtSeams(geom, tolerance) {
  geom.computeVertexNormals();
  const positions = geom.attributes.position;
  const normals = geom.attributes.normal;
  const count = positions.count;
  const f = 1 / tolerance;

  const groups = new Map();
  for (let i = 0; i < count; i++) {
    const x = positions.getX(i);
    const y = positions.getY(i);
    const z = positions.getZ(i);
    const key = `${Math.round(x * f)}_${Math.round(y * f)}_${Math.round(z * f)}`;
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(i);
  }

  for (const indices of groups.values()) {
    if (indices.length < 2) continue;
    let nx = 0, ny = 0, nz = 0;
    for (const i of indices) {
      nx += normals.getX(i);
      ny += normals.getY(i);
      nz += normals.getZ(i);
    }
    const len = Math.sqrt(nx * nx + ny * ny + nz * nz);
    if (len > 1e-9) { nx /= len; ny /= len; nz /= len; }
    for (const i of indices) {
      normals.setXYZ(i, nx, ny, nz);
    }
  }
  normals.needsUpdate = true;
}

// ============ Build the d8 mesh ============
const R = 1.0;
const CORNER_R = 0.12;
const DETAIL = 5;
const NUM_EXTENT = 1.15;

const octGeom = createOctahedronDie(R, CORNER_R, DETAIL, NUM_EXTENT);
smoothNormalsAtSeams(octGeom, 5e-4);

const octMat = new THREE.MeshPhysicalMaterial({
  color: 0xffffff,
  map: atlasTexture,
  roughness: 0.42,
  metalness: 0.0,
  clearcoat: 0.45,
  clearcoatRoughness: 0.32,
  reflectivity: 0.45,
});

const oct = new THREE.Mesh(octGeom, octMat);
oct.castShadow = true;
oct.receiveShadow = true;
oct.scale.set(0.7, 0.7, 0.7);
oct.rotation.set(0.3, 0.5, 0.1);
scene.add(oct);

// ============ Interaction ============
let isDragging = false;
let prev = { x: 0, y: 0 };
let autoRotate = true;
function onDown(e) {
  isDragging = true; autoRotate = false;
  const p = e.touches ? e.touches[0] : e;
  prev.x = p.clientX; prev.y = p.clientY;
}
function onMove(e) {
  if (!isDragging) return;
  const p = e.touches ? e.touches[0] : e;
  const dx = p.clientX - prev.x, dy = p.clientY - prev.y;
  oct.rotation.y += dx * 0.008;
  oct.rotation.x += dy * 0.008;
  prev.x = p.clientX; prev.y = p.clientY;
}
function onUp() { isDragging = false; }
renderer.domElement.addEventListener('mousedown', onDown);
addEventListener('mousemove', onMove);
addEventListener('mouseup', onUp);
renderer.domElement.addEventListener('touchstart', onDown, { passive: true });
addEventListener('touchmove', onMove, { passive: true });
addEventListener('touchend', onUp);
renderer.domElement.addEventListener('wheel', (e) => {
  e.preventDefault();
  camDist = Math.max(2.8, Math.min(9, camDist + e.deltaY * 0.005));
  updateCamera();
}, { passive: false });

// ============ Animate ============
function animate() {
  requestAnimationFrame(animate);
  if (autoRotate) oct.rotation.y += 0.005;
  renderer.render(scene, camera);
}
animate();

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
